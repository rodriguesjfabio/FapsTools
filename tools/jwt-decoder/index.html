<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>JWT Decoder</title>

    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/tool-ui.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <header class="site-header">
      <div class="container tool-header">
        <div id="tool-icon" class="tool-icon"></div>
        <div class="tool-header-content">
          <h1 id="tool-title"></h1>
          <p id="tool-description"></p>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div class="tool-container">
        <div class="input-section">
          <div class="section-header">
            <h3>JWT Token</h3>
            <div class="section-actions">
              <span id="input-char-count" class="char-count">0 characters</span>
              <button id="clear-input-btn" class="clear-btn" title="Clear input">🗑️</button>
            </div>
          </div>
          <textarea
            id="jwt-input"
            class="tool-input"
            placeholder="Paste your JWT token here..."
            spellcheck="false"
          ></textarea>
        </div>

        <div class="tool-actions">
          <button id="decode-btn">Decode JWT</button>
        </div>

        <div class="output-section">
          <div class="section-header">
            <h3>Header</h3>
            <div class="section-actions">
              <button id="copy-header-btn" class="copy-btn" title="Copy to clipboard">📋</button>
            </div>
          </div>
          <textarea
            id="header-output"
            class="tool-output"
            placeholder="JWT header will appear here..."
            readonly
            spellcheck="false"
          ></textarea>
        </div>

        <div class="output-section">
          <div class="section-header">
            <h3>Payload</h3>
            <div class="section-actions">
              <button id="copy-payload-btn" class="copy-btn" title="Copy to clipboard">📋</button>
            </div>
          </div>
          <textarea
            id="payload-output"
            class="tool-output"
            placeholder="JWT payload will appear here..."
            readonly
            spellcheck="false"
          ></textarea>
        </div>

        <div class="output-section">
          <div class="section-header">
            <h3>Signature</h3>
            <div class="section-actions">
              <button id="copy-signature-btn" class="copy-btn" title="Copy to clipboard">📋</button>
            </div>
          </div>
          <textarea
            id="signature-output"
            class="tool-output"
            placeholder="JWT signature will appear here..."
            readonly
            spellcheck="false"
          ></textarea>
        </div>
      </div>
    </div>
    <div id="footer"></div>

    <script src="/assets/js/components.js"></script>
    <script src="/assets/js/tool-page.js"></script>
    <script src="./tool.js"></script>
  </body>
</html>
